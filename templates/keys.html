<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Управление ключами</title>
    <script src="/static/js/sweetalert2.all.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #eee; padding: 10px; }
        td { padding: 15px; border: 2px solid black; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; max-width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; border: none; color: white; }
        .btn-blue { background: #007bff; }
        .btn-red { background: red; margin-top: 10px; }
        
        /* Стили для кнопки порта, чтобы она выглядела опрятно */
        .btn-serial { background: #6c757d; color: white; padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-serial.selected { background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Управление ключами</h2>
        <table>
            <thead>
                <tr>
                    <th>Владелец ключа</th>
                    <th>Параметры</th>
                </tr>
            </thead>
            <tbody>
                {% for visitor, key, labs, valid in keys %}
                <tr>
                    <td style="background: #aaa; width: 30%;">
                        <strong style="font-size: 1.1em;">{{ visitor }}</strong>
                    </td>
                    <td>
                        <form action="/admin/update_key" method="POST" autocomplete="off">            
                            <div class="form-group">
                                <label>Доступные помещения:</label>
                                <input type="text" name="labs" placeholder="{{ labs }}">
                            </div>
                            <div class="form-group">
                                <label>Ключ активен:</label>
                                <input type="text" name="valid" placeholder="{% if valid %}Да{% else %}Нет{% endif %}">
                            </div>
                            <input type="hidden" name="visitor" value="{{ visitor }}">
                            <button type="submit" class="btn btn-blue">Применить настройки</button>
                        </form>
                        <hr>
                        <form action="/admin/dell_key" method="POST">            
                            <input type="hidden" name="key" value="{{ key }}">
                            <button type="submit" class="btn btn-red">Удалить</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
                
                <tr>
                    <td style="background: #aaa; width: 30%;">
                        <strong style="font-size: 1.1em;">Новый ключ</strong>
                    </td>
                    <td>
                        <form id="addKeyForm" action="/admin/add_key" method="POST" autocomplete="off">            
                            <div class="form-group">
                                <label>Владелец ключа:</label>
                                <input type="text" name="visitor" required placeholder="ФИО">
                            </div>
                            <div class="form-group">
                                <label>Локальный считыватель:</label>
                                <button type="button" id="ChooseSerial" class="btn-serial">Выбрать COM-порт</button>
                                <span id="portStatus" style="margin-left: 10px; font-size: 0.9em; color: red;">Порт не выбран</span>
                            </div>
                            <div class="form-group">
                                <label>Доступные помещения:</label>
                                <input type="text" name="labs" required placeholder="504, 505">
                            </div>
                            <input type="hidden" name="valid" value="True"> 
                            <button type="submit" class="btn btn-blue">Добавить ключ</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <br>
        <a href="/admin" style="text-decoration: none; color: #007bff;">← Вернуться в меню</a>
    </div>

    <script>
        // Глобальная переменная для хранения выбранного пользователем порта
        let selectedPort = null;

        const ChooseSerialButton = document.getElementById('ChooseSerial');
        const portStatus = document.getElementById('portStatus');

        // === 1. Обработчик кнопки выбора порта (только выбирает порт) ===
        ChooseSerialButton.addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                Swal.fire('Ошибка', 'Ваш браузер не поддерживает работу с COM-портами. Используйте Chrome/Edge', 'error');
                return;
            }

            try {
                // Просим браузер показать окно выбора COM-порта
                selectedPort = await navigator.serial.requestPort();
                
                // Если порт успешно выбран, визуально отмечаем это
                ChooseSerialButton.textContent = "Порт выбран";
                ChooseSerialButton.classList.add('selected');
                portStatus.textContent = "Готов к прошивке";
                portStatus.style.color = "green";
                
                Swal.fire('Успех', 'Порт успешно выбран. Теперь заполните форму и нажмите "Добавить ключ"', 'success');
            } catch (error) {
                console.error(error);
                selectedPort = null;
                ChooseSerialButton.textContent = "Выбрать COM-порт";
                ChooseSerialButton.classList.remove('selected');
                portStatus.textContent = "Порт не выбран";
                portStatus.style.color = "red";
                Swal.fire('Ошибка', 'Порт не был выбран: ' + error.message, 'error');
            }
        });

        // === 2. Обработчик отправки формы (Логика прошивки и сохранения) ===
        const addKeyForm = document.getElementById('addKeyForm');
        if (addKeyForm) {
            addKeyForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Проверяем, выбрал ли пользователь порт заранее
                if (!selectedPort) {
                    Swal.fire('Внимание', 'Пожалуйста, сначала выберите COM-порт устройства с помощью кнопки!', 'warning');
                    return;
                }

                const form = e.target;
                const formData = new FormData(form);

                try {
                    // Открываем выбранный ранее порт
                    await selectedPort.open({ baudRate: 9600 });

                    // Показываем окно ожидания метки
                    Swal.fire({
                        title: 'Ожидание метки...',
                        text: 'Пожалуйста, поднесите пустую карту к локальному считывателю',
                        icon: 'info',
                        allowOutsideClick: false,
                        showConfirmButton: false,
                        didOpen: () => { Swal.showLoading(); }
                    });

                    // Шаг А: Запрашиваем у бэкенда генерацию пакета ключа
                    const initResponse = await fetch(form.getAttribute('action'), { method: 'GET'});
                    const initResult = await initResponse.json();
                    if (initResult.status !== 'success') {
                        throw new Error(initResult.message || 'Ошибка генерации пакета на сервере');
                    }

                    // Переводим hex-строку от бэкенда в массив байт для Arduino
                    const packetBytes = new Uint8Array(initResult.message.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
                    //const packetBytes = new Uint8Array(initResult.message);
                    

                    // Шаг Б: Пишем команду в COM-порт клиента
                    setTimeout(async () => {
                        const writer = selectedPort.writable.getWriter();
                        await writer.write(new Uint8Array([0x57])); // Отправляем 'W'
                        await writer.write(packetBytes);            // Отправляем пакет
                        writer.releaseLock();
                        
                        // Шаг В: Ждем ответ от Arduino Nano о завершении записи
                        const reader = selectedPort.readable.getReader();
                        let decoder = new TextDecoder();
                        let serialResponse = "";
                        
                        while (true) {
                            const { value, done } = await reader.read();
                            if (done) break;
                            serialResponse += decoder.decode(value);
                            console.log("wait");
                            if (serialResponse.includes("Write complite")) {
                                break;
                            }
                        }
                        reader.releaseLock();
                        await selectedPort.close(); // Обязательно закрываем порт после работы

                        // Шаг Г: Прошивка успешна, отправляем команду бэкенду записать всё в базу данных
                        const saveResponse = await fetch('/admin/save_key', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                visitor: formData.get('visitor'),
                                labs: formData.get('labs'),
                                key: initResult.message,
                                valid: formData.get('valid')
                            })
                        });
                        const saveResult = await saveResponse.json();

                        // Шаг Д: Финал
                        Swal.fire({
                            title: saveResult.status === 'success' ? 'Успех!' : 'Ошибка',
                            text: saveResult.message,
                            icon: saveResult.status,
                            confirmButtonText: 'Ок'
                        }).then((swalResult) => {
                            if (saveResult.status === 'success' && swalResult.isConfirmed) {
                                location.reload(); 
                            }
                        });

                    }, 2000);
                } catch (error) {
                    console.error(error);
                    // На случай непредвиденного сбоя пытаемся освободить порт, если он остался открыт
                    try { await selectedPort.close(); } catch(pErr) {}
                    Swal.fire('Ошибка', 'Произошла ошибка при прошивке: ' + error.message, 'error');
                }
            });
        }

        // === 3. Обработчик всех остальных форм (Удаление и Обновление) ===
        document.querySelectorAll('form').forEach(form => {
            if (form.id !== 'addKeyForm') {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const formData = new FormData(form);
                    
                    try {
                        const response = await fetch(form.getAttribute('action'), {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();

                        Swal.fire({
                            title: result.status === 'success' ? 'Успех!' : 'Ошибка',
                            text: result.message,
                            icon: result.status,
                            confirmButtonText: 'Ок'
                        }).then((swalResult) => {
                            if (result.status === 'success' && swalResult.isConfirmed) {
                                form.reset();
                                location.reload();                                
                            }
                        });
                    } catch (error) {
                        console.error(error);
                        Swal.fire('Ошибка', 'Ошибка связи с сервером', 'error');
                    }
                });
            }
        });
    </script>
</body>
</html>
